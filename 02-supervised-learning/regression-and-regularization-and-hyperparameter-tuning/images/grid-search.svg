<svg width="760" height="265" viewBox="0 0 760 265" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="amber-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#b9770e"/></marker>
  </defs>
  <rect width="760" height="265" fill="white"/>
  <text x="20" y="20" font-size="11" fill="#666">Grid search &#8212; try every combination of hyperparameter values, score each with k-fold CV, keep the best</text>

  <!-- axis labels -->
  <text x="263" y="44" font-size="12" font-weight="bold" fill="#3b5a86" text-anchor="middle">alpha (regularization strength)</text>
  <text x="38" y="144" font-size="12" font-weight="bold" fill="#3b5a86" text-anchor="middle" transform="rotate(-90 38 144)">polynomial degree</text>

  <!-- column headers -->
  <text x="165" y="62" font-size="11" fill="#666" text-anchor="middle">0.01</text>
  <text x="263" y="62" font-size="11" fill="#666" text-anchor="middle">0.1</text>
  <text x="361" y="62" font-size="11" fill="#666" text-anchor="middle">1</text>
  <!-- row headers -->
  <text x="108" y="96" font-size="11" fill="#666" text-anchor="end">2</text>
  <text x="108" y="148" font-size="11" fill="#666" text-anchor="end">3</text>
  <text x="108" y="200" font-size="11" fill="#666" text-anchor="end">4</text>

  <!-- grid cells: mean CV score per combination -->
  <rect x="120" y="70" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="165" y="97" font-size="13" fill="#3b5a86" text-anchor="middle">0.71</text>
  <rect x="218" y="70" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="263" y="97" font-size="13" fill="#3b5a86" text-anchor="middle">0.74</text>
  <rect x="316" y="70" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="361" y="97" font-size="13" fill="#3b5a86" text-anchor="middle">0.72</text>

  <rect x="120" y="122" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="165" y="149" font-size="13" fill="#3b5a86" text-anchor="middle">0.78</text>
  <rect x="218" y="122" width="90" height="44" rx="6" fill="#fef9e7" stroke="#b9770e" stroke-width="2.5"/><text x="263" y="143" font-size="13" font-weight="bold" fill="#b9770e" text-anchor="middle">0.86</text><text x="263" y="158" font-size="10" font-weight="bold" fill="#b9770e" text-anchor="middle">best</text>
  <rect x="316" y="122" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="361" y="149" font-size="13" fill="#3b5a86" text-anchor="middle">0.80</text>

  <rect x="120" y="174" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="165" y="201" font-size="13" fill="#3b5a86" text-anchor="middle">0.75</text>
  <rect x="218" y="174" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="263" y="201" font-size="13" fill="#3b5a86" text-anchor="middle">0.83</text>
  <rect x="316" y="174" width="90" height="44" rx="6" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/><text x="361" y="201" font-size="13" fill="#3b5a86" text-anchor="middle">0.79</text>

  <!-- steps -->
  <text x="450" y="86" font-size="13" font-weight="bold" fill="#3b5a86">1. Try every combination</text>
  <text x="450" y="103" font-size="11" fill="#666">3 alphas &#215; 3 degrees = 9 candidate models</text>
  <text x="450" y="134" font-size="13" font-weight="bold" fill="#3b5a86">2. Cross-validate each one</text>
  <text x="450" y="151" font-size="11" fill="#666">each cell shows the mean 5-fold CV score</text>
  <text x="450" y="182" font-size="13" font-weight="bold" fill="#b9770e">3. Keep the winner</text>
  <text x="450" y="199" font-size="11" fill="#666">highest score wins: alpha = 0.1, degree = 3</text>
  <line x1="443" y1="178" x2="318" y2="152" stroke="#b9770e" stroke-width="1.5" marker-end="url(#amber-arrow)"/>

  <text x="380" y="245" font-size="11" fill="#666" text-anchor="middle" font-family="Menlo, Consolas, monospace">GridSearchCV(model, param_grid, cv=5) does all of this in one call</text>
</svg>
