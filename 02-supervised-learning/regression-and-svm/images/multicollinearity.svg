  <path d="M184,48 C240,60 250,86 290,98" fill="none" stroke="#555" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M184,172 C240,160 250,134 290,122" fill="none" stroke="#aaa" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ahg)"/>

  <line x1="102" y1="72" x2="102" y2="148" stroke="#c0392b" stroke-width="1.6" marker-start="url(#ahr)" marker-end="url(#ahr)"/>
