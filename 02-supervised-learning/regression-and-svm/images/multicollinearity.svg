  <rect x="20" y="24" width="164" height="48" rx="8" fill="#eaf1fb" stroke="#3b5a86" stroke-width="1.5"/>
  <rect x="20" y="148" width="164" height="48" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5" stroke-dasharray="5 3"/>
  <rect x="292" y="86" width="158" height="48" rx="8" fill="#e9f7ef" stroke="#2e7d4f" stroke-width="1.5"/>

